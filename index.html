<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#E9ECE4">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#12160F">
<title>Grand Tours 2026</title>
<meta name="description" content="Grand Tours 2026 — valitse kilpailu: Tour de France, Giro d'Italia ja Vuelta a España. · Pick a Grand Tour: routes, profiles and live results.">

<meta property="og:locale:alternate" content="en_GB">
<meta property="og:locale:alternate" content="fr_FR">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Grand Tours 2026">

<!-- Favicon: on-theme emblem (gold elevation profile + red KOM dot). -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231E2A22'/%3E%3Cpath d='M4 23 L11 12 L16 17 L22 7 L28 23 Z' fill='%23C99A2E'/%3E%3Ccircle cx='22' cy='7' r='2.6' fill='%23B23B32'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light dark;
    --paper:#E9ECE4;
    --paper-panel:#F4F6EF;
    --ink:#1E2A22;
    --ink-soft:#4C5A50;
    --line:#C6CCBC;
    --gold:#C99A2E;
    --gold-deep:#9C7620;
    --red:#B23B32;
    --pink:#D14E7C;
    --shadow: 0 2px 10px rgba(30,42,34,0.08);
    --shadow-lift: 0 8px 26px rgba(30,42,34,0.14);
    --solid-bg:#1E2A22;
    --solid-fg:#ffffff;
    --hover:rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#12160F;
      --paper-panel:#1B211A;
      --ink:#E7ECDF;
      --ink-soft:#9FA99A;
      --line:#333B31;
      --gold:#D8AC44;
      --gold-deep:#E3BE63;
      --red:#D3574C;
      --pink:#E06A93;
      --shadow: 0 2px 14px rgba(0,0,0,0.45);
      --shadow-lift: 0 10px 30px rgba(0,0,0,0.55);
      --solid-bg:#E7ECDF;
      --solid-fg:#12160F;
      --hover:rgba(255,255,255,0.06);
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  header.top{
    display:flex;flex-direction:column;gap:6px;
    padding-bottom:22px;margin-bottom:30px;
    border-bottom:3px solid var(--ink);
  }
  .top-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-soft);
  }
  .langsel{display:flex;gap:0;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;}
  .langsel button{
    background:transparent;border:1px solid var(--line);
    padding:4px 10px;cursor:pointer;color:var(--ink-soft);
  }
  .langsel button:first-child{border-radius:2px 0 0 2px;}
  .langsel button:last-child{border-radius:0 2px 2px 0;}
  .langsel button:not(:first-child){border-left:none;}
  .langsel button.active{background:var(--solid-bg);color:var(--solid-fg);border-color:var(--solid-bg);}
  .langsel button:hover:not(.active){color:var(--ink);}
  h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:clamp(30px,6vw,54px);
    letter-spacing:.01em;
    text-transform:uppercase;
    margin:4px 0 4px;
    line-height:1.02;
  }
  .sub{
    font-size:clamp(14px,2vw,16px);
    color:var(--ink-soft);
    max-width:62ch;line-height:1.5;
  }

  .tours{
    list-style:none;margin:0;padding:0;
    display:grid;gap:18px;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  }
  .tourcard{
    position:relative;display:flex;flex-direction:column;gap:6px;
    background:var(--paper-panel);
    border:1px solid var(--line);border-radius:12px;
    padding:22px 22px 20px;
    text-decoration:none;color:inherit;
    box-shadow:var(--shadow);
    overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .tourcard::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
    background:var(--accent, var(--gold));
  }
  .tourcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lift);border-color:var(--accent,var(--gold));}
  .tourcard:focus-visible{outline:2px solid var(--accent,var(--gold));outline-offset:3px;}
  .tour-tld{
    align-self:flex-start;
    font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:.12em;text-transform:uppercase;
    color:#fff;background:var(--accent,var(--gold));
    padding:3px 8px;border-radius:20px;margin-bottom:6px;
  }
  .tour-name{
    font-family:'Oswald',sans-serif;font-weight:600;
    font-size:26px;line-height:1.05;text-transform:uppercase;letter-spacing:.01em;
  }
  .tour-dates{
    font-family:'JetBrains Mono',monospace;font-size:12px;
    color:var(--ink-soft);letter-spacing:.03em;
  }
  .tour-desc{font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.45;}
  .tour-cta{
    display:inline-flex;align-items:center;gap:6px;margin-top:14px;
    font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink);
  }
  .tour-cta svg{width:14px;height:14px;}
  .tourcard.soon .tour-cta{color:var(--ink-soft);}
  .badge-soon{
    position:absolute;top:16px;right:16px;
    font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-soft);border:1px solid var(--line);
    padding:2px 8px;border-radius:20px;
  }

  footer{
    margin-top:44px;padding-top:18px;border-top:1px solid var(--line);
    font-size:12px;color:var(--ink-soft);line-height:1.5;
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="top-row">
      <div class="eyebrow" id="eyebrow"></div>
      <div class="langsel" id="langSel" role="group" aria-label="Kieli / Language">
        <button data-lang="fi" aria-label="Suomeksi" aria-pressed="false">FI</button>
        <button data-lang="fr" aria-label="En français" aria-pressed="false">FR</button>
        <button data-lang="en" aria-label="In English" aria-pressed="false">EN</button>
      </div>
    </div>
    <h1>Grand Tours</h1>
    <div class="sub" id="subDesc"></div>
  </header>

  <ul class="tours" id="tourList" aria-label="Grand Tours 2026">
    <li>
      <a class="tourcard" href="tdf2026.html" style="--accent:var(--gold)">
        <span class="tour-tld">FRA</span>
        <span class="tour-name">Tour de France</span>
        <span class="tour-dates" id="tdfDates"></span>
        <span class="tour-desc" id="tdfDesc"></span>
        <span class="tour-cta"><span id="tdfCta"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </span>
      </a>
    </li>
    <li>
      <a class="tourcard soon" href="giro2026.html" style="--accent:var(--pink)">
        <span class="badge-soon" id="giroBadge"></span>
        <span class="tour-tld">ITA</span>
        <span class="tour-name">Giro d'Italia</span>
        <span class="tour-dates" id="giroDates"></span>
        <span class="tour-cta"><span id="giroCta"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </span>
      </a>
    </li>
    <li>
      <a class="tourcard soon" href="vuelta2026.html" style="--accent:var(--red)">
        <span class="badge-soon" id="vueltaBadge"></span>
        <span class="tour-tld">ESP</span>
        <span class="tour-name">Vuelta a España</span>
        <span class="tour-dates" id="vueltaDates"></span>
        <span class="tour-cta"><span id="vueltaCta"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </span>
      </a>
    </li>
  </ul>

  <footer id="footerNote"></footer>
</div>

<script>
/* Language preference is shared with the individual tour pages via the same
   localStorage key, so a visitor's choice carries across the whole site. */
const LANG_KEY = 'tdf2026-lang';

const STRINGS = {
  fi: {
    eyebrow: 'Kausi 2026 · Grand tourit',
    subDesc: 'Valitse kilpailu. Tällä hetkellä avoinna on Tour de France 2026 — Giro d’Italia ja Vuelta a España tulevat myöhemmin.',
    tdfDates: '4.–26. heinäkuuta 2026',
    tdfDesc: 'Kaikki 21 etappia, reitit, korkeusprofiilit ja päivittyvät tulokset.',
    giroDates: 'Toukokuu 2026',
    vueltaDates: 'Elo–syyskuu 2026',
    open: 'Avaa',
    soon: 'Tulossa',
    footerNote: 'Epävirallinen, ei-kaupallinen fanisivusto. Ei liity A.S.O.:hon, RCS Sportiin, Unipublic’iin tai näiden kilpailuihin.',
  },
  en: {
    eyebrow: '2026 season · Grand Tours',
    subDesc: 'Pick a race. The Tour de France 2026 is available now — the Giro d’Italia and Vuelta a España are coming later.',
    tdfDates: '4–26 July 2026',
    tdfDesc: 'All 21 stages, routes, elevation profiles and live-updating results.',
    giroDates: 'May 2026',
    vueltaDates: 'August–September 2026',
    open: 'Open',
    soon: 'Coming soon',
    footerNote: 'An unofficial, non-commercial fan project. Not affiliated with A.S.O., RCS Sport, Unipublic, or these races.',
  },
  fr: {
    eyebrow: 'Saison 2026 · Grands Tours',
    subDesc: 'Choisissez une course. Le Tour de France 2026 est disponible — le Giro d’Italia et la Vuelta a España arrivent bientôt.',
    tdfDates: '4–26 juillet 2026',
    tdfDesc: 'Les 21 étapes, parcours, profils et classements mis à jour.',
    giroDates: 'Mai 2026',
    vueltaDates: 'Août–septembre 2026',
    open: 'Ouvrir',
    soon: 'Bientôt',
    footerNote: 'Projet de fans non officiel et non commercial. Sans lien avec A.S.O., RCS Sport, Unipublic ou ces courses.',
  },
};

function detectLang(){
  const saved = localStorage.getItem(LANG_KEY);
  if(saved==='fi' || saved==='en' || saved==='fr') return saved;
  const nav = (navigator.language||'en').toLowerCase();
  if(nav.startsWith('fi')) return 'fi';
  if(nav.startsWith('fr')) return 'fr';
  return 'en';
}
let lang = detectLang();
function t(key){
  const v = STRINGS[lang][key];
  return v !== undefined ? v : STRINGS.en[key];
}

function render(){
  document.getElementById('eyebrow').textContent = t('eyebrow');
  document.getElementById('subDesc').textContent = t('subDesc');
  document.getElementById('tdfDates').textContent = t('tdfDates');
  document.getElementById('tdfDesc').textContent = t('tdfDesc');
  document.getElementById('tdfCta').textContent = t('open');
  document.getElementById('giroDates').textContent = t('giroDates');
  document.getElementById('giroCta').textContent = t('soon');
  document.getElementById('giroBadge').textContent = t('soon');
  document.getElementById('vueltaDates').textContent = t('vueltaDates');
  document.getElementById('vueltaCta').textContent = t('soon');
  document.getElementById('vueltaBadge').textContent = t('soon');
  document.getElementById('footerNote').textContent = t('footerNote');
  document.querySelectorAll('#langSel button').forEach(b=>{
    const active = b.dataset.lang===lang;
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
  document.documentElement.lang = lang;
}

document.querySelectorAll('#langSel button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    lang = btn.dataset.lang;
    localStorage.setItem(LANG_KEY, lang);
    render();
  });
});

render();
</script>
</body>
</html>
