<style>
  :root{
    color-scheme:light dark;
    --paper:#E9ECE4;--paper-panel:#F4F6EF;--ink:#1E2A22;--ink-soft:#4C5A50;--line:#C6CCBC;
    --gold-deep:#9C7620;--blue:#3B6485;--green:#3E7A57;--red:#B23B32;
    --rosa:#D6497F;--rosa-deep:#B23368;--ciclamino:#8E4BB0;--azzurra:#2E7CBF;--bianca:#8B8F84;--grey:#8B8F84;
    --shadow:0 2px 10px rgba(30,42,34,0.08);
    --solid-bg:#1E2A22;--solid-fg:#fff;--hover:rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#12160F;--paper-panel:#1B211A;--ink:#E7ECDF;--ink-soft:#9FA99A;--line:#333B31;
      --gold-deep:#E3BE63;--blue:#77ABD2;--green:#3E7A57;--red:#D3574C;
      --rosa:#EE6E9F;--rosa-deep:#EE6E9F;--ciclamino:#B173D0;--azzurra:#5CA0DA;--bianca:#AEB4A6;--grey:#8B8F84;
      --shadow:0 2px 14px rgba(0,0,0,0.45);
      --solid-bg:#E7ECDF;--solid-fg:#12160F;--hover:rgba(255,255,255,0.06);
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  header.top{display:flex;flex-direction:column;gap:6px;padding-bottom:22px;margin-bottom:22px;border-bottom:3px solid var(--ink);}
  .backlink{
    display:inline-flex;align-items:center;gap:5px;align-self:flex-start;margin-bottom:6px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-soft);text-decoration:none;
  }
  .backlink svg{width:14px;height:14px;}
  .backlink:hover{color:var(--ink);}
  .backlink:focus-visible{outline:2px solid var(--rosa);outline-offset:3px;border-radius:2px;}
  .top-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .langsel{display:flex;gap:0;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;}
  .langsel button{background:transparent;border:1px solid var(--line);padding:4px 10px;cursor:pointer;color:var(--ink-soft);}
  .langsel button:first-child{border-radius:2px 0 0 2px;}
  .langsel button:last-child{border-radius:0 2px 2px 0;}
  .langsel button:not(:first-child){border-left:none;}
  .langsel button.active{background:var(--solid-bg);color:var(--solid-fg);border-color:var(--solid-bg);}
  .langsel button:hover:not(.active){color:var(--ink);}
  h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(28px,5vw,46px);letter-spacing:.01em;text-transform:uppercase;margin:2px 0 4px;line-height:1.02;}
  h1 span{color:var(--rosa-deep);}
  .sub{font-size:clamp(14px,2vw,16px);color:var(--ink-soft);max-width:70ch;line-height:1.5;}
  .finaltag{
    display:inline-flex;align-items:center;gap:6px;margin-top:10px;align-self:flex-start;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--solid-fg);background:var(--solid-bg);padding:4px 10px;border-radius:20px;
  }

  /* Tabs */
  .tabs{display:flex;gap:0;margin-bottom:22px;border-bottom:2px solid var(--ink);}
  .tab{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.05em;
    background:transparent;border:none;cursor:pointer;color:var(--ink-soft);
    padding:10px 22px 8px;border-bottom:3px solid transparent;margin-bottom:-2px;
  }
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--ink);border-bottom:3px solid var(--rosa-deep);}
  .view{display:none;}
  .view.active{display:block;}

  /* Stages layout */
  .layout{display:grid;grid-template-columns:250px 1fr;gap:24px;align-items:start;}
  @media (max-width:860px){.layout{grid-template-columns:1fr;}}
  .stagelist{background:var(--paper-panel);border:1px solid var(--line);border-radius:2px;position:sticky;top:16px;}
  .stagelist .listhead{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);padding:12px 14px 8px;}
  ul.stages{list-style:none;margin:0;padding:0 6px 10px;max-height:74vh;overflow-y:auto;}
  @media (max-width:860px){.stagelist{position:static;}ul.stages{max-height:none;overflow-y:visible;}}
  li.stage-item{margin:2px 0;}
  button.stage-btn{
    width:100%;text-align:left;display:flex;align-items:center;gap:10px;
    background:transparent;border:none;cursor:pointer;padding:8px 8px;border-radius:2px;
    font-family:'Inter',sans-serif;color:var(--ink);border-left:3px solid transparent;
  }
  button.stage-btn:hover{background:var(--hover);}
  button.stage-btn.active{background:var(--paper);border-left:3px solid var(--rosa-deep);}
  .num{font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;width:26px;flex:0 0 auto;color:var(--ink-soft);}
  .stage-btn.active .num{color:var(--rosa-deep);}
  .btn-text{flex:1;min-width:0;}
  .btn-route{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .btn-meta{font-size:10.5px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .typedot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .rest-row{padding:6px 14px;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);margin:4px 0;}

  /* Stage panel */
  .panel{background:var(--paper-panel);border:1px solid var(--line);border-radius:2px;padding:22px 24px 26px;}
  .stagehead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:4px;}
  .stagehead h2{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(22px,3vw,30px);text-transform:uppercase;margin:0;letter-spacing:.01em;}
  .datebadge{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--solid-fg);background:var(--solid-bg);padding:5px 9px;border-radius:2px;white-space:nowrap;}
  .typepill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;color:#fff;margin-top:8px;}
  .factbar{display:flex;flex-wrap:wrap;gap:18px 28px;margin:16px 0 6px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .fact{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .fact b{display:block;font-family:'Oswald',sans-serif;font-size:17px;color:var(--ink);font-weight:600;}
  .fact b.win{color:var(--rosa-deep);}
  .chartbox{margin:18px 0 6px;}
  .chart-caption{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-top:6px;}
  svg.profile{width:100%;height:auto;display:block;}
  svg.profile .pf-grid{stroke:var(--line);}
  svg.profile .pf-tick{fill:var(--ink-soft);}
  .twocol{display:grid;grid-template-columns:1.3fr 1fr;gap:22px;margin-top:18px;}
  .twocol > *{min-width:0;}
  @media (max-width:700px){.twocol{grid-template-columns:1fr;}}
  .block{overflow-x:auto;}
  .block h3{font-family:'Oswald',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 0 8px;}
  .narrative{font-size:14.5px;line-height:1.62;}
  .narrative p{margin:0 0 10px;}
  table.points{width:100%;border-collapse:collapse;font-size:13px;}
  table.points th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.05em;padding:4px 6px;border-bottom:1px solid var(--line);}
  table.points td{padding:6px 6px;border-bottom:1px solid var(--line);vertical-align:top;}
  .flagchip{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#fff;background:var(--rosa-deep);padding:1px 6px;border-radius:20px;}
  .empty-note{color:var(--ink-soft);font-size:13px;font-style:italic;}

  /* Results view (classifications + stage winners) */
  h2.section{font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase;letter-spacing:.02em;margin:6px 0 14px;}
  .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
  .card{background:var(--paper-panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
  .card__head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);}
  .jersey{width:14px;height:20px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,0.15);}
  .card__title{font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.02em;line-height:1.1;}
  .card__sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase;}
  table.cls{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.cls th,table.cls td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:baseline;}
  table.cls thead th{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;}
  table.cls tbody tr:last-child td{border-bottom:none;}
  td.pos{font-family:'JetBrains Mono',monospace;color:var(--ink-soft);width:1%;white-space:nowrap;}
  tr.leader td.pos{color:var(--rosa-deep);font-weight:600;}
  .rider{font-weight:600;}
  .nat{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);margin-left:6px;letter-spacing:.04em;}
  .team{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  td.num{font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  td.gap{font-family:'JetBrains Mono',monospace;color:var(--ink-soft);white-space:nowrap;}
  table.stages-tbl td.route{color:var(--ink);}
  table.stages-tbl td.win{font-weight:600;}
  table.stages-tbl tr.pink td.win{color:var(--rosa-deep);}
  .tablewrap{overflow-x:auto;}

  footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);line-height:1.55;}
  footer b{color:var(--ink);}
  .disclaimer{font-size:12px;color:var(--ink-soft);background:var(--paper-panel);border:1px dashed var(--line);padding:10px 12px;border-radius:2px;margin-top:14px;line-height:1.55;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>

function detectLang(){
  const saved = localStorage.getItem(LANG_KEY);
  if(saved==='fi'||saved==='en'||saved==='fr') return saved;
  const nav = (navigator.language||'en').toLowerCase();
  if(nav.startsWith('fi')) return 'fi';
  if(nav.startsWith('fr')) return 'fr';
  return 'en';
}

/* ---------- FORMAT HELPERS ---------- */
function localeTag(){ return lang==='fi' ? 'fi-FI' : lang==='fr' ? 'fr-FR' : 'en-GB'; }
function fmtKm(k){ const s=(Math.round(k*10)/10).toString(); return (lang==='en'?s:s.replace('.',','))+' km'; }
function fmtGain(m){ return m.toLocaleString(localeTag())+' m'; }
function fmtDate(iso){
  const d=new Date(iso+'T12:00:00');
  const opts = lang==='fi' ? {weekday:'short',day:'numeric',month:'numeric'} : {weekday:'short',day:'numeric',month:'short'};
  return new Intl.DateTimeFormat(localeTag(),opts).format(d);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- ILLUSTRATIVE PROFILE ---------- */
function genProfile(st){
  const k=st.km;
  const P=(frac,h)=>[+(k*frac).toFixed(1),h];
  if(st.type==='itt') return [P(0,20),P(.5,26),P(1,22)];
  if(st.type==='flat') return [P(0,20),P(.3,25),P(.5,19),P(.7,27),P(1,18)];
  if(st.type==='hilly') return [P(0,24),P(.2,46),P(.4,32),P(.6,55),P(.8,38),P(1,st.summit?88:44)];
  // mountain
  if(st.summit) return [P(0,24),P(.28,50),P(.48,34),P(.68,60),P(.82,46),P(1,94)];
  return [P(0,30),P(.25,62),P(.45,40),P(.65,74),P(.85,46),P(1,56)];
}
function buildPath(points,totalKm,W,H,padL,padR,padT,padB){
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xs=points.map(p=>padL+(p[0]/totalKm)*plotW);
  const ys=points.map(p=>padT+plotH-(p[1]/100)*plotH);
  let d=`M ${xs[0]},${ys[0]}`;
  for(let i=1;i<xs.length;i++){ const mx=(xs[i-1]+xs[i])/2; d+=` Q ${xs[i-1]},${ys[i-1]} ${mx},${(ys[i-1]+ys[i])/2}`; }
  d+=` L ${xs[xs.length-1]},${ys[ys.length-1]}`;
  return {d,plotH};
}
function xForKm(km,totalKm,W,padL,padR){ return padL+(km/totalKm)*(W-padL-padR); }
function renderProfile(st){
  const W=900,H=240,padL=30,padR=16,padT=16,padB=30, totalKm=st.km;
  const {d,plotH}=buildPath(genProfile(st),totalKm,W,H,padL,padR,padT,padB);
  const baseY=padT+plotH;
  let svg=`<svg class="profile" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${esc(t('profileAria')(st.n))}">`;
  for(let g=0;g<=4;g++){ const gy=padT+plotH*g/4; svg+=`<line class="pf-grid" x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke-width="1" opacity="0.6"/>`; }
  const step = totalKm>150?50:(totalKm>60?20:10);
  for(let kk=0;kk<=totalKm+0.01;kk+=step){
    const kx=xForKm(kk,totalKm,W,padL,padR);
    svg+=`<line class="pf-grid" x1="${kx}" y1="${padT}" x2="${kx}" y2="${baseY}" stroke-width="1" opacity="0.35"/>`;
    svg+=`<text class="pf-tick" x="${kx}" y="${H-8}" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">${Math.round(kk)}</text>`;
  }
  const col=typeColor(st.type);
  svg+=`<path d="${d} L ${xForKm(totalKm,totalKm,W,padL,padR)},${baseY} L ${padL},${baseY} Z" fill="${col}" opacity="0.16"/>`;
  svg+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round"/>`;
  svg+=`</svg>`;
  return svg;
}

/* ---------- DESCRIPTION (generated from facts + winner) ---------- */
function winnerFor(n){
  if(!RESULTS || !Array.isArray(RESULTS.stageWinners)) return '';
  const w=RESULTS.stageWinners.find(x=>x.n===n);
  return w ? (w.winner||'') : '';
}
function genDesc(st){
  const sep = lang==='fr' ? ' : ' : ': ';
  const parts=[`${t('typeDesc')[st.type]}${sep}${esc(st.start)} → ${esc(st.finish)}, ${fmtKm(st.km)}.`];
  if(st.summit) parts.push(esc(t('summitNote')(st.summit)));
  const w=winnerFor(st.n);
  if(w) parts.push(esc(t('winnerNote')(w)));
  return '<p>'+parts.join(' ')+'</p>';
}

/* ---------- STAGE LIST ---------- */
let activeIdx = 0;
function renderStageList(){
  const listEl=document.getElementById('stageList');
  listEl.innerHTML='';
  stages.forEach((s,idx)=>{
    const li=document.createElement('li'); li.className='stage-item';
    const btn=document.createElement('button');
    btn.className='stage-btn'+(idx===activeIdx?' active':'');
    btn.dataset.idx=idx;
    btn.innerHTML=`<span class="num">${String(s.n).padStart(2,'0')}</span>
      <span class="typedot" style="background:${typeColor(s.type)}"></span>
      <span class="btn-text"><div class="btn-route">${esc(s.start)} → ${esc(s.finish)}</div>
      <div class="btn-meta">${fmtDate(s.date)} · ${fmtKm(s.km)}</div></span>`;
    btn.addEventListener('click',()=>selectStage(idx));
    li.appendChild(btn); listEl.appendChild(li);
    if(REST_AFTER[s.n]){
      const rli=document.createElement('li'); rli.className='stage-item';
      const div=document.createElement('div'); div.className='rest-row';
      div.textContent=`${fmtDate(REST_AFTER[s.n])} · ${t('restDay')}`;
      rli.appendChild(div); listEl.appendChild(rli);
    }
  });
}
function selectStage(idx){
  activeIdx=idx;
  document.querySelectorAll('.stage-btn').forEach(b=>b.classList.toggle('active',+b.dataset.idx===idx));
  const b=document.querySelector(`.stage-btn[data-idx="${idx}"]`); if(b) b.scrollIntoView({block:'nearest'});
  renderPanel(stages[idx]);
}
function renderPanel(st){
  const panel=document.getElementById('panel');
  const tc=typeColor(st.type);
  const climbs=st.climbs||[];
  let climbRows='';
  if(climbs.length){
    climbRows=climbs.map(c=>`<tr><td>${esc(c.name)}</td><td>${c.len?fmtKm(c.len):'—'}</td><td>${c.grad?esc(c.grad)+' %':'—'}</td></tr>`).join('');
  }
  const w=winnerFor(st.n);
  panel.innerHTML=`
    <div class="stagehead">
      <div>
        <h2>${t('stagePrefix')} ${st.n} — ${esc(st.start)} → ${esc(st.finish)}</h2>
        <span class="typepill" style="background:${tc}">${t('typeLabels')[st.type]}</span>
      </div>
      <span class="datebadge">${fmtDate(st.date)}</span>
    </div>
    <div class="factbar">
      <div class="fact">${t('factDistance')}<b>${fmtKm(st.km)}</b></div>
      <div class="fact">${t('factType')}<b>${t('typeLabels')[st.type]}</b></div>
      <div class="fact">${t('factGain')}<b>${st.gain?fmtGain(st.gain):'—'}</b></div>
      <div class="fact">${t('factWinner')}<b class="win">${w?esc(w):'—'}</b></div>
    </div>
    <div class="chartbox">
      ${renderProfile(st)}
      <div class="chart-caption">${t('chartCaption')}</div>
    </div>
    <div class="twocol">
      <div class="block narrative"><h3>${t('descHeader')}</h3>${genDesc(st)}</div>
      <div class="block">
        <h3>${t('climbsHeader')}</h3>
        ${climbRows ? `<table class="points"><thead><tr><th>${t('climbHead')[0]}</th><th>${t('climbHead')[1]}</th><th>${t('climbHead')[2]}</th></tr></thead><tbody>${climbRows}</tbody></table>`
                    : `<p class="empty-note">${t('noClimbs')}</p>`}
      </div>
    </div>`;
}

/* ---------- RESULTS (classifications + stage winners) ---------- */
const CLASSES = [
  {key:'gc',        nameKey:'gcName',     jerseyKey:'gcJersey',     colour:'var(--rosa)',      cols:'time'},
  {key:'points',    nameKey:'pointsName', jerseyKey:'pointsJersey', colour:'var(--ciclamino)', cols:'pts'},
  {key:'mountains', nameKey:'momName',    jerseyKey:'momJersey',    colour:'var(--azzurra)',   cols:'pts'},
  {key:'youth',     nameKey:'youthName',  jerseyKey:'youthJersey',  colour:'var(--bianca)',    cols:'time'},
  {key:'teams',     nameKey:'teamsName',  jerseyKey:'teamsJersey',  colour:'var(--grey)',      cols:'time', team:true},
];
function riderCell(row,teamOnly){
  if(teamOnly) return `<span class="rider">${esc(row.rider)}</span>`;
  const nat=row.nat?`<span class="nat">${esc(row.nat)}</span>`:'';
  const team=row.team?`<span class="team">${esc(row.team)}</span>`:'';
  return `<span class="rider">${esc(row.rider)}</span>${nat}${team}`;
}
function classCard(cfg){
  const rows=(RESULTS && RESULTS[cfg.key] && RESULTS[cfg.key].rows)||[];
  const isPts=cfg.cols==='pts';
  let head=`<tr><th>${t('colPos')}</th><th>${t('colRider')}</th>`;
  head+= isPts?`<th>${t('colPts')}</th></tr>`:`<th>${t('colTime')}</th><th>${t('colGap')}</th></tr>`;
  let body='';
  rows.forEach(r=>{
    const leader=r.pos===1?' class="leader"':'';
    const tail= isPts?`<td class="num">${esc(r.val)}</td>`:`<td class="num">${esc(r.val)}</td><td class="gap">${esc(r.gap||(r.pos===1?'—':''))}</td>`;
    body+=`<tr${leader}><td class="pos">${esc(r.pos)}</td><td>${riderCell(r,cfg.team)}</td>${tail}</tr>`;
  });
  return `<div class="card"><div class="card__head">
      <span class="jersey" style="background:${cfg.colour}"></span>
      <div><div class="card__title">${esc(t(cfg.nameKey))}</div><div class="card__sub">${esc(t(cfg.jerseyKey))}</div></div>
    </div><div class="tablewrap"><table class="cls"><thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
}
function renderResults(){
  document.getElementById('classGrid').innerHTML=CLASSES.map(classCard).join('');
  const winners=(RESULTS && RESULTS.stageWinners)||[];
  const gcWinner=(RESULTS && RESULTS.gc && RESULTS.gc.rows[0] && RESULTS.gc.rows[0].rider)||'';
  document.getElementById('stagesThead').innerHTML=`<tr><th>${t('colStage')}</th><th>${t('colRoute')}</th><th>${t('colWinner')}</th></tr>`;
  document.getElementById('stagesTbody').innerHTML=winners.map(w=>{
    const pink=w.winner && w.winner===gcWinner?' class="pink"':'';
    return `<tr${pink}><td class="pos">${esc(w.n)}</td><td class="route">${esc(w.route||'')}</td><td class="win">${esc(w.winner||'')}</td></tr>`;
  }).join('');
}

  document.getElementById('backLinkText').textContent=t('backToTours');

    const active=b.dataset.lang===lang;
    b.classList.toggle('active',active);
    b.setAttribute('aria-pressed',active?'true':'false');
  });
  document.documentElement.lang=lang;
}

/* ---------- TABS ---------- */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>{ x.classList.toggle('active',x===tab); x.setAttribute('aria-selected',x===tab?'true':'false'); });
    const v=tab.dataset.view;
    document.querySelectorAll('.view').forEach(sec=>sec.classList.toggle('active', sec.id==='view-'+v));
  });
});

/* ---------- LANGUAGE ---------- */
document.querySelectorAll('#langSel button').forEach(btn=>{
  btn.addEventListener('click',()=>{ lang=btn.dataset.lang; localStorage.setItem(LANG_KEY,lang); render(); });
});

async function load(){
  try{
    const resp=await fetch(DATA_URL,{cache:'no-store'});
    if(resp.ok) RESULTS=await resp.json();
  }catch(e){ /* file:// or offline — winners/standings simply blank */ }
  render();
}
load();
