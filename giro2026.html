<!-- Leaflet (real map in the expanded stage locator). Loaded from unpkg with
     Subresource Integrity so a tampered CDN response is rejected. Only used by
     the expanded map; the collapsed minimap is the self-contained SVG below. -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<!-- Shared colour theme (light + dark palettes, flag-stripe classes). -->
<link rel="stylesheet" href="theme.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  header.top{display:flex;flex-direction:column;gap:6px;padding-bottom:22px;margin-bottom:22px;border-bottom:3px solid var(--ink);}
  .backlink{
    display:inline-flex;align-items:center;gap:5px;align-self:flex-start;margin-bottom:6px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-soft);text-decoration:none;
  }
  .backlink svg{width:14px;height:14px;}
  .backlink:hover{color:var(--ink);}
  .backlink:focus-visible{outline:2px solid var(--rosa);outline-offset:3px;border-radius:2px;}
  .top-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .langsel{display:flex;gap:0;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;}
  .langsel button{background:transparent;border:1px solid var(--line);padding:4px 10px;cursor:pointer;color:var(--ink-soft);}
  .langsel button:first-child{border-radius:2px 0 0 2px;}
  .langsel button:last-child{border-radius:0 2px 2px 0;}
  .langsel button:not(:first-child){border-left:none;}
  .langsel button.active{background:var(--solid-bg);color:var(--solid-fg);border-color:var(--solid-bg);}
  .langsel button:hover:not(.active){color:var(--ink);}
  h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(28px,5vw,46px);letter-spacing:.01em;text-transform:uppercase;margin:2px 0 4px;line-height:1.02;}
  h1 span{color:var(--rosa-deep);}
  /* Title text striped in the Italian tricolore — colours come from theme.css
     (.it-g, .fs-w, .it-r). */
  .sub{font-size:clamp(14px,2vw,16px);color:var(--ink-soft);max-width:70ch;line-height:1.5;}
  .finaltag{
    display:inline-flex;align-items:center;gap:6px;margin-top:10px;align-self:flex-start;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--solid-fg);background:var(--solid-bg);padding:4px 10px;border-radius:20px;
  }

  /* Tabs */
  .tabs{display:flex;gap:0;margin-bottom:22px;border-bottom:2px solid var(--ink);}
  .tab{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.05em;
    background:transparent;border:none;cursor:pointer;color:var(--ink-soft);
    padding:10px 22px 8px;border-bottom:3px solid transparent;margin-bottom:-2px;
  }
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--ink);border-bottom:3px solid var(--rosa-deep);}
  .view{display:none;}
  .view.active{display:block;}

  /* Stages layout
     .stagelist's height is set in pixels by JS (syncStageListHeight),
     copied straight from the detail panel's rendered height, so the two
     columns are always exactly the same height regardless of viewport size
     or stage content — CSS alone (grid stretch, flex, vh-based caps) kept
     producing one-sided mismatches, because whichever column got a size cap
     fed back into how tall Grid made the row, throwing off the other
     column. If the list's own content doesn't fit in that height it just
     scrolls internally (overflow-y:auto below); the panel is never resized,
     so a short panel never gains a blank area under its content either. */
  .layout{display:grid;grid-template-columns:250px 1fr;gap:24px;align-items:start;}
  @media (max-width:860px){.layout{grid-template-columns:1fr;}}
  .stagelist{background:var(--paper-panel);border:1px solid var(--line);border-radius:2px;display:flex;flex-direction:column;position:sticky;top:16px;}
  .stagelist .listhead{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);padding:12px 14px 8px;flex:0 0 auto;}
  ul.stages{list-style:none;margin:0;padding:0 6px 10px;flex:1 1 auto;min-height:0;overflow-y:auto;}
  @media (max-width:860px){.stagelist{position:static;}ul.stages{overflow-y:visible;}}
  li.stage-item{margin:2px 0;}
  button.stage-btn{
    width:100%;text-align:left;display:flex;align-items:center;gap:10px;
    background:transparent;border:none;cursor:pointer;padding:8px 8px;border-radius:2px;
    font-family:'Inter',sans-serif;color:var(--ink);border-left:3px solid transparent;
  }
  button.stage-btn:hover{background:var(--hover);}
  button.stage-btn.active{background:var(--paper);border-left:3px solid var(--rosa-deep);}
  .num{font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;width:26px;flex:0 0 auto;color:var(--ink-soft);}
  .stage-btn.active .num{color:var(--rosa-deep);}
  .btn-text{flex:1;min-width:0;}
  .btn-route{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .btn-meta{font-size:10.5px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .typedot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .rest-row{padding:6px 14px;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);margin:4px 0;}

  /* Stage panel */
  .panel{background:var(--paper-panel);border:1px solid var(--line);border-radius:2px;padding:22px 24px 26px;}
  .stagehead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:4px;}
  .stagehead h2{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(22px,3vw,30px);text-transform:uppercase;margin:0;letter-spacing:.01em;}
  .datebadge{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--solid-fg);background:var(--solid-bg);padding:5px 9px;border-radius:2px;white-space:nowrap;}
  .stagehead-side{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  /* Locator minimap: a rough Italy outline (with a Bulgaria inset for the
     Grande Partenza) and a start→finish marker. All strokes/fills use theme
     variables so it follows light/dark live. */
  svg.minimap{
    width:112px;height:auto;display:block;
    background:var(--paper);border:1px solid var(--line);border-radius:2px;
    padding:5px;
  }
  svg.minimap .mm-land{fill:var(--hover);stroke:var(--grey);stroke-width:1;stroke-linejoin:round;}
  svg.minimap .mm-inset{fill:none;stroke:var(--line);stroke-width:0.8;stroke-dasharray:2,2;}
  svg.minimap .mm-route{stroke:var(--rosa-deep);stroke-width:2.2;stroke-linecap:round;}
  svg.minimap .mm-start{fill:var(--paper);stroke:var(--rosa-deep);stroke-width:1.4;}
  svg.minimap .mm-finish{fill:var(--red);}
  /* Collapsed minimap doubles as the expand button. */
  .mm-btn{background:none;border:none;padding:0;cursor:pointer;display:block;}
  .mm-btn:hover svg.minimap{border-color:var(--grey);}
  .mm-btn:focus-visible{outline:2px solid var(--rosa);outline-offset:2px;border-radius:2px;}
  /* Expanded map: full panel width. The viewBox is portrait, so the SVG is
     given a fixed height and letterboxes horizontally (labels may spill
     into the side margins, which is fine — svg overflow stays visible
     within the element box). */
  .mapbox{position:relative;margin:16px 0 4px;}
  /* Expanded view: a real Leaflet + OpenStreetMap map. Fixed height so the
     panel's layout height is known immediately (before tiles load), which
     keeps syncStageListHeight correct. */
  #stage-map{
    width:100%;height:min(60vh,460px);
    border:1px solid var(--line);border-radius:2px;
    background:var(--paper);z-index:0;
  }
  .leaflet-container{font-family:'Inter',system-ui,sans-serif;}
  .leaflet-control-attribution{font-size:9px;}
  /* Dark mode: invert only the raster tile pane so the light OSM map doesn't
     glare against the dark UI. Route/markers live in the overlay pane and are
     left untouched. A pragmatic stand-in for a dedicated dark tile set. */
  @media (prefers-color-scheme: dark){
    #stage-map .leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(.92) contrast(.9);}
  }
  .mm-close{
    position:absolute;top:8px;right:8px;z-index:1;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    background:var(--paper-panel);border:1px solid var(--line);border-radius:2px;
    color:var(--ink-soft);padding:4px 9px;cursor:pointer;
  }
  .mm-close:hover{background:var(--hover);color:var(--ink);}
  .mm-close:focus-visible{outline:2px solid var(--rosa);outline-offset:2px;}
  .typepill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;color:#fff;margin-top:8px;}
  .factbar{display:flex;flex-wrap:wrap;gap:18px 28px;margin:16px 0 6px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .fact{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .fact b{display:block;font-family:'Oswald',sans-serif;font-size:17px;color:var(--ink);font-weight:600;}
  .fact b.win{color:var(--rosa-deep);}
  .chartbox{margin:18px 0 6px;}
  .chart-caption{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-top:6px;}
  svg.profile{width:100%;height:auto;display:block;}
  svg.profile .pf-grid{stroke:var(--line);}
  svg.profile .pf-tick{fill:var(--ink-soft);}
  .twocol{display:grid;grid-template-columns:1.3fr 1fr;gap:22px;margin-top:18px;}
  .twocol > *{min-width:0;}
  @media (max-width:700px){.twocol{grid-template-columns:1fr;}}
  .block{overflow-x:auto;}
  .block h3{font-family:'Oswald',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 0 8px;}
  .narrative{font-size:14.5px;line-height:1.62;}
  .narrative p{margin:0 0 10px;}
  table.points{width:100%;border-collapse:collapse;font-size:13px;}
  table.points th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.05em;padding:4px 6px;border-bottom:1px solid var(--line);}
  table.points td{padding:6px 6px;border-bottom:1px solid var(--line);vertical-align:top;}
  td.atkm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);white-space:nowrap;}
  .catchip{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#fff;min-width:16px;text-align:center;padding:1px 6px;border-radius:20px;}
  .dash{color:var(--ink-soft);}
  .flagchip{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#fff;background:var(--green);padding:1px 6px;border-radius:20px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 2px;font-size:11.5px;color:var(--ink-soft);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .leg-swatch{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .empty-note{color:var(--ink-soft);font-size:13px;font-style:italic;}

  /* Results view (classifications + stage winners) */
  h2.section{font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase;letter-spacing:.02em;margin:6px 0 14px;}
  .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
  .card{background:var(--paper-panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
  .card__head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);}
  .jersey{width:14px;height:20px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,0.15);}
  .card__title{font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.02em;line-height:1.1;}
  .card__sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase;}
  table.cls{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.cls th,table.cls td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:baseline;}
  table.cls thead th{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;}
  table.cls tbody tr:last-child td{border-bottom:none;}
  td.pos{font-family:'JetBrains Mono',monospace;color:var(--ink-soft);width:1%;white-space:nowrap;}
  tr.leader td.pos{color:var(--rosa-deep);font-weight:600;}
  .rider{font-weight:600;}
  .nat{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);margin-left:6px;letter-spacing:.04em;}
  .team{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  td.num{font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  td.gap{font-family:'JetBrains Mono',monospace;color:var(--ink-soft);white-space:nowrap;}
  table.stages-tbl td.route{color:var(--ink);}
  table.stages-tbl td.win{font-weight:600;}
  table.stages-tbl tr.pink td.win{color:var(--rosa-deep);}
  .tablewrap{overflow-x:auto;}

  footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);line-height:1.55;}
  footer b{color:var(--ink);}
  .disclaimer{font-size:12px;color:var(--ink-soft);background:var(--paper-panel);border:1px dashed var(--line);padding:10px 12px;border-radius:2px;margin-top:14px;line-height:1.55;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>

<div class="wrap">

<script>

function localeTag(){ return lang==='fi' ? 'fi-FI' : lang==='fr' ? 'fr-FR' : 'en-GB'; }
function fmtKm(k){ const s=(Math.round(k*10)/10).toString(); return (lang==='en'?s:s.replace('.',','))+' km'; }
function fmtGain(m){ return m.toLocaleString(localeTag())+' m'; }
function fmtDate(iso){

/* ---------- ILLUSTRATIVE PROFILE ----------
   Climbs with a known summit km drive the profile shape, so the climb markers
   line up with the bumps. Stages whose climbs have no published km fall back to
   a generic shape by type (markers are then omitted for those climbs). */
function climbsWithKm(st){ return (st.climbs||[]).filter(c=>c.km!=null).sort((a,b)=>a.km-b.km); }
function genericProfile(st){
  const k=st.km, P=(frac,h)=>[+(k*frac).toFixed(1),h];
  if(st.type==='itt') return [P(0,20),P(.5,26),P(1,22)];
  if(st.type==='flat') return [P(0,20),P(.3,25),P(.5,19),P(.7,27),P(1,18)];
  if(st.type==='hilly') return [P(0,24),P(.2,46),P(.4,32),P(.6,55),P(.8,38),P(1,st.summit?88:44)];
  if(st.summit) return [P(0,24),P(.28,50),P(.48,34),P(.68,60),P(.82,46),P(1,94)];
  return [P(0,30),P(.25,62),P(.45,40),P(.65,74),P(.85,46),P(1,56)];
}
function climbHeight(c){ // illustrative peak height 40–95 from length × gradient
  const gain=(c.len||4)*(c.grad||5); // ~ metres/10
  return Math.max(40, Math.min(95, 36 + gain*0.4));
}
function genProfile(st){
  const cs=climbsWithKm(st);
  if(st.type==='itt' || !cs.length) return genericProfile(st);
  const total=st.km, pts=[[0,18]];
  let last=0;
  cs.forEach(c=>{
    const foot=Math.max(last+1, Math.max(1, c.km-(c.len||4)));
    if(foot>last+1) pts.push([+foot.toFixed(1),22]);
    pts.push([c.km, climbHeight(c)]);
    if(c.km < total-4) pts.push([+Math.min(total, c.km+Math.max(3,(c.len||4)*0.5)).toFixed(1),28]);
    last=c.km;
  });
  const lastPt=pts[pts.length-1];
  if(lastPt[0] < total-0.5) pts.push([total, st.summit?90:18]);
  else if(st.summit) lastPt[1]=Math.max(lastPt[1],90);
  // enforce strictly increasing x
  const out=[];
  pts.forEach(p=>{ const x=Math.max(0,Math.min(total,p[0])); if(!out.length || x>out[out.length-1][0]) out.push([+x.toFixed(1),p[1]]); });
  return out;
}
function buildPath(points,totalKm,W,H,padL,padR,padT,padB){
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xs=points.map(p=>padL+(p[0]/totalKm)*plotW);
  const ys=points.map(p=>padT+plotH-(p[1]/100)*plotH);
  let d=`M ${xs[0]},${ys[0]}`;
  for(let i=1;i<xs.length;i++){ const mx=(xs[i-1]+xs[i])/2; d+=` Q ${xs[i-1]},${ys[i-1]} ${mx},${(ys[i-1]+ys[i])/2}`; }
  d+=` L ${xs[xs.length-1]},${ys[ys.length-1]}`;
  return {d,plotH};
}
function xForKm(km,totalKm,W,padL,padR){ return padL+(km/totalKm)*(W-padL-padR); }
function renderProfile(st){
  const W=900,H=240,padL=30,padR=16,padT=16,padB=30, totalKm=st.km;
  const {d,plotH}=buildPath(genProfile(st),totalKm,W,H,padL,padR,padT,padB);
  const baseY=padT+plotH;
  let svg=`<svg class="profile" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${esc(t('profileAria')(st.n))}">`;
  for(let g=0;g<=4;g++){ const gy=padT+plotH*g/4; svg+=`<line class="pf-grid" x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke-width="1" opacity="0.6"/>`; }
  const step = totalKm>150?50:(totalKm>60?20:10);
  for(let kk=0;kk<=totalKm+0.01;kk+=step){
    const kx=xForKm(kk,totalKm,W,padL,padR);
    svg+=`<line class="pf-grid" x1="${kx}" y1="${padT}" x2="${kx}" y2="${baseY}" stroke-width="1" opacity="0.35"/>`;
    svg+=`<text class="pf-tick" x="${kx}" y="${H-8}" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">${Math.round(kk)}</text>`;
  }
  const col=typeColor(st.type);
  svg+=`<path d="${d} L ${xForKm(totalKm,totalKm,W,padL,padR)},${baseY} L ${padL},${baseY} Z" fill="${col}" opacity="0.16"/>`;
  svg+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round"/>`;
  // climb markers (only for climbs whose summit km is known)
  climbsWithKm(st).forEach(c=>{
    const cx=xForKm(c.km,totalKm,W,padL,padR);
    const foot=xForKm(Math.max(0,c.km-(c.len||4)),totalKm,W,padL,padR);
    const cc=CAT_COLOR[c.cat]||'var(--climb-none)';
    svg+=`<rect x="${foot}" y="${padT}" width="${Math.max(2,cx-foot)}" height="${plotH}" fill="${cc}" opacity="0.14"/>`;
    svg+=`<line x1="${cx}" y1="${padT}" x2="${cx}" y2="${baseY}" stroke="${cc}" stroke-width="1.5" stroke-dasharray="2,2"/>`;
    svg+=`<circle cx="${cx}" cy="${padT-3}" r="4.5" fill="${cc}"/>`;
  });
  // intermediate-sprint markers — a green flag rising from the route to the
  // sprint's kilometre point, so the location is clearly visible on the graph.
  (st.sprints||[]).forEach(s=>{
    const sx=xForKm(s.km,totalKm,W,padL,padR);
    const flagTop=padT+plotH*0.30;
    svg+=`<line x1="${sx}" y1="${flagTop}" x2="${sx}" y2="${baseY}" stroke="${SPRINT_COLOR}" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.55"/>`;
    svg+=`<line x1="${sx}" y1="${flagTop}" x2="${sx}" y2="${flagTop+16}" stroke="${SPRINT_COLOR}" stroke-width="1.8"/>`;
    svg+=`<path d="M ${sx} ${flagTop} L ${sx+12} ${flagTop+4.5} L ${sx} ${flagTop+9} Z" fill="${SPRINT_COLOR}"/>`;
    svg+=`<circle cx="${sx}" cy="${baseY}" r="3.4" fill="${SPRINT_COLOR}" stroke="var(--paper-panel)" stroke-width="1"/>`;
  });
  svg+=`</svg>`;
  return svg;
}

/* ---------- LOCATOR MINIMAP ----------
   Very simplified, hand-traced outlines ([lon,lat] pairs): the Italian
   mainland with Sicily and Sardinia for recognizability, plus Bulgaria in a
   dashed inset box (drawn over the Adriatic) for the Grande Partenza stages
   1–3. Only meant to give a rough "where is this stage" cue — not
   cartographically accurate. */
const MM_ITALY = [
  [7.49,43.87],[6.88,44.42],[6.63,45.11],[6.80,45.83],[7.86,45.92],[8.44,46.46],
  [9.04,45.85],[9.30,46.30],[10.13,46.23],[10.47,46.87],[11.10,46.93],[12.13,47.08],
  [12.40,46.70],[13.70,46.52],[13.60,45.79],[13.10,45.68],[12.42,45.42],[12.25,45.18],
  [12.53,44.90],[12.28,44.60],[12.57,44.06],[13.52,43.62],[14.21,42.46],[14.78,42.07],
  [15.14,41.93],[16.19,41.89],[16.02,41.42],[16.87,41.13],[17.94,40.63],[18.49,40.15],
  [18.36,39.80],[17.23,40.47],[16.62,39.62],[17.13,39.08],[16.58,38.44],[16.06,37.92],
  [15.65,38.11],[15.90,38.68],[15.98,39.30],[15.79,39.87],[15.28,40.03],[14.93,40.33],
  [14.77,40.68],[14.25,40.83],[13.57,41.21],[12.62,41.45],[11.80,42.09],[10.71,42.94],
  [10.31,43.54],[9.85,44.03],[8.93,44.40],[8.48,44.30],[8.03,43.88]
];
const MM_SICILY = [
  [12.43,37.80],[13.37,38.13],[15.24,38.22],[15.57,38.19],[15.09,37.50],[15.30,37.06],
  [15.09,36.68],[14.25,37.06],[13.58,37.29]
];
const MM_SARDINIA = [
  [9.19,41.24],[9.55,40.92],[9.73,40.40],[9.11,39.21],[8.43,38.96],[8.40,39.90],[8.31,40.56]
];
const MM_BULGARIA = [
  [22.67,44.21],[23.60,43.80],[25.00,43.70],[26.10,43.95],[27.27,44.12],[28.55,43.74],
  [28.34,43.43],[27.92,43.20],[27.47,42.49],[27.94,42.10],[26.55,41.90],[26.32,41.71],
  [25.90,41.31],[24.50,41.44],[23.60,41.37],[22.90,41.34],[22.36,42.32],[22.50,43.00]
];
// Approximate start/finish coordinates ([lon,lat]) per stage number.
// Longitudes > 20 belong to the Bulgarian stages and land in the inset.
const STAGE_COORDS = {
  1:[[27.73,42.66],[27.47,42.51]],  2:[[27.47,42.51],[25.62,43.08]],
  3:[[24.75,42.14],[23.32,42.70]],  4:[[16.59,38.91],[16.25,39.30]],
  5:[[15.78,39.90],[15.80,40.64]],  6:[[15.00,40.42],[14.25,40.85]],
  7:[[13.61,41.26],[14.11,42.05]],  8:[[14.17,42.35],[13.72,43.16]],
  9:[[12.35,44.26],[10.83,44.12]], 10:[[10.23,43.87],[10.14,44.04]],
 11:[[10.62,43.84],[9.32,44.32]],  12:[[8.03,43.89],[8.79,44.76]],
 13:[[8.61,44.91],[8.55,45.92]],   14:[[7.31,45.74],[7.30,45.68]],
 15:[[9.01,44.99],[9.19,45.46]],   16:[[9.02,46.19],[8.93,46.47]],
 17:[[9.52,45.53],[11.00,46.17]],  18:[[11.07,46.19],[12.17,45.90]],
 19:[[11.91,46.02],[12.02,46.41]], 20:[[13.14,46.28],[12.52,46.11]],
 21:[[12.48,41.89],[12.48,41.89]]
};

// Equirectangular projection: longitudes squeezed by cos(42.5°) so Italy
// keeps roughly its true proportions. The Bulgaria inset has its own
// smaller-scale projection into the top-right corner of the viewBox.
const MM_BOX = {lonMin:6.5, lonMax:18.7, latMin:36.5, latMax:47.4};
const MM_K = Math.cos(42.5*Math.PI/180);
const MM_BG = {x0:62, y0:4, lon0:22.2, lat0:44.35, s:5.2, k:Math.cos(42.7*Math.PI/180)};
function mmXY(p){
  if(p[0]>20){
    return [(MM_BG.x0+(p[0]-MM_BG.lon0)*MM_BG.k*MM_BG.s).toFixed(1),
            (MM_BG.y0+(MM_BG.lat0-p[1])*MM_BG.s).toFixed(1)];
  }
  return [((p[0]-MM_BOX.lonMin)*MM_K*10).toFixed(1),
          ((MM_BOX.latMax-p[1])*10).toFixed(1)];
}
function mmPath(pts, close){
  return pts.map((p,i)=>(i?'L':'M')+mmXY(p).join(' ')).join(' ')+(close?' Z':'');
}

// Whether the locator map is shown expanded (full panel width). Persists
// across stage switches and language changes; renderPanel re-renders the
// matching variant.
let mapExpanded = false;

function mmStageGeom(n){
  const c = STAGE_COORDS[n];
  if(!c) return null;
  const [sx,sy] = mmXY(c[0]), [fx,fy] = mmXY(c[1]);
  // Start & finish (nearly) in the same place: a single dot instead of a line.
  const same = Math.abs(c[0][0]-c[1][0])<0.05 && Math.abs(c[0][1]-c[1][1])<0.05;
  return {sx,sy,fx,fy,same};
}

function mmBase(st, cls){
  const W = ((MM_BOX.lonMax-MM_BOX.lonMin)*MM_K*10).toFixed(1);
  const H = ((MM_BOX.latMax-MM_BOX.latMin)*10).toFixed(1);
  let svg = `<svg class="${cls}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${esc(t('minimapAria')(st.n))}">`;
  svg += `<path class="mm-land" d="${mmPath(MM_ITALY,true)}"/>`;
  svg += `<path class="mm-land" d="${mmPath(MM_SICILY,true)}"/>`;
  svg += `<path class="mm-land" d="${mmPath(MM_SARDINIA,true)}"/>`;
  svg += `<rect class="mm-inset" x="60" y="1.5" width="28.5" height="20.5"/>`;
  svg += `<path class="mm-land" d="${mmPath(MM_BULGARIA,true)}"/>`;
  return svg;
}

function mmRouteMarks(g){
  let svg = '';
  if(!g.same){
    svg += `<line class="mm-route" x1="${g.sx}" y1="${g.sy}" x2="${g.fx}" y2="${g.fy}"/>`;
    svg += `<circle class="mm-start" cx="${g.sx}" cy="${g.sy}" r="2.4"/>`;
  }
  svg += `<circle class="mm-finish" cx="${g.fx}" cy="${g.fy}" r="${g.same?3.2:2.6}"/>`;
  return svg;
}

function renderMinimap(st){
  const g = mmStageGeom(st.n);
  if(!g) return '';
  const svg = mmBase(st,'minimap') + mmRouteMarks(g) + '</svg>';
  return `<button class="mm-btn" data-mm-toggle aria-expanded="false" title="${esc(t('minimapExpand'))}">${svg}</button>`;
}

// Expanded view markup: a container Leaflet mounts into (see initStageMap).
// Only the ✕ button collapses — the map itself stays interactive (pan/zoom),
// so it is not a collapse target.
function renderMinimapLarge(st){
  if(!STAGE_COORDS[st.n]) return '';
  return `
    <div class="mapbox">
      <button class="mm-close" data-mm-toggle aria-expanded="true">${esc(t('minimapCollapse'))}</button>
      <div id="stage-map" role="application" aria-label="${esc(t('minimapAria')(st.n))}"></div>
      <div class="chart-caption" id="stage-map-caption">${t('minimapCaption')}</div>
    </div>`;
}

/* ---------- REAL ROUTE MAP (Leaflet + OpenStreetMap) ----------
   Per-stage route polylines live in data/giro2026-routes.json (built by
   scripts/fetch_routes.py from cyclingstage.com GPX). Loaded once, lazily, on
   first expand. Stages missing a route fall back to a straight start→finish
   line derived from STAGE_COORDS. */
let routesData = null, routesPromise = null;
function loadRoutes(){
  if(routesData) return Promise.resolve(routesData);
  if(!routesPromise){
    routesPromise = fetch(ROUTES_URL, {cache:'force-cache'})
      .then(r => r.ok ? r.json() : null)
      .then(d => { routesData = (d && d.stages) ? d : {stages:{}}; return routesData; })
      .catch(() => { routesData = {stages:{}}; return routesData; });
  }
  return routesPromise;
}

let stageMap = null; // active Leaflet instance (null when collapsed)
function destroyStageMap(){
  if(stageMap){ try{ stageMap.remove(); }catch(e){} stageMap = null; }
}

function initStageMap(st){
  if(!mapExpanded) return;
  // Leaflet is a deferred script; if the user somehow expands before it lands,
  // retry shortly. In practice expansion is a post-load click, so L is ready.
  if(!window.L){ setTimeout(()=>initStageMap(st), 120); return; }
  const el = document.getElementById('stage-map');
  if(!el) return;
  destroyStageMap();

  const map = L.map(el, {scrollWheelZoom:false, attributionControl:true});
  stageMap = map;
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:17,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  // Route/marker colours pulled from the live theme variables so they track
  // light/dark. Leaflet SVG overlays can't reference CSS vars directly.
  const css = getComputedStyle(document.documentElement);
  const ROSA = css.getPropertyValue('--rosa-deep').trim() || '#B23368';
  const RED  = css.getPropertyValue('--red').trim() || '#B23B32';

  const draw = () => {
    if(stageMap !== map) return; // a newer render superseded this one
    const pts = (routesData.stages || {})[st.n];         // [[lat,lon]…] or undefined
    const c = STAGE_COORDS[st.n];                         // [[lon,lat],[lon,lat]]
    let line, startLL, finishLL, approx = false;
    if(pts && pts.length){
      line = pts; startLL = pts[0]; finishLL = pts[pts.length-1];
    }else{
      approx = true;
      startLL = [c[0][1], c[0][0]];
      finishLL = [c[1][1], c[1][0]];
      line = [startLL, finishLL];
    }
    const poly = L.polyline(line, approx
      ? {color:ROSA, weight:3, opacity:.9, dashArray:'6,8'}
      : {color:ROSA, weight:4, opacity:.95}).addTo(map);
    const same = Math.abs(startLL[0]-finishLL[0])<1e-4 && Math.abs(startLL[1]-finishLL[1])<1e-4;
    if(!same){
      L.circleMarker(startLL, {radius:6, color:'#fff', weight:2, fillColor:ROSA, fillOpacity:1}).addTo(map);
    }
    L.circleMarker(finishLL, {radius:7, color:'#fff', weight:2, fillColor:RED, fillOpacity:1}).addTo(map);
    map.fitBounds(poly.getBounds(), {padding:[26,26]});
    map.invalidateSize();
    const cap = document.getElementById('stage-map-caption');
    if(cap) cap.textContent = approx ? t('minimapCaptionApprox') : t('minimapCaption');
  };

  if(routesData) draw(); else loadRoutes().then(()=>{ if(stageMap===map) draw(); });
  // A tick later the container has its final size — re-measure so tiles fill it.
  setTimeout(()=>{ if(stageMap===map) map.invalidateSize(); }, 60);
}

/* ---------- DESCRIPTION (generated from facts + winner) ---------- */
function winnerFor(n){
  if(!RESULTS || !Array.isArray(RESULTS.stageWinners)) return '';
  const w=RESULTS.stageWinners.find(x=>x.n===n);
  return w ? (w.winner||'') : '';
}
function genDesc(st){
  const sep = lang==='fr' ? ' : ' : ': ';
  const parts=[`${t('typeDesc')[st.type]}${sep}${esc(st.start)} → ${esc(st.finish)}, ${fmtKm(st.km)}.`];
  if(st.summit) parts.push(esc(t('summitNote')(st.summit)));
  const w=winnerFor(st.n);
  if(w) parts.push(esc(t('winnerNote')(w)));
  return '<p>'+parts.join(' ')+'</p>';
}

/* ---------- STAGE LIST ---------- */
let activeIdx = 0;
function renderStageList(){
  const listEl=document.getElementById('stageList');
  listEl.innerHTML='';
  stages.forEach((s,idx)=>{
    const li=document.createElement('li'); li.className='stage-item';
    const btn=document.createElement('button');
    btn.className='stage-btn'+(idx===activeIdx?' active':'');
    btn.dataset.idx=idx;
    btn.innerHTML=`<span class="num">${String(s.n).padStart(2,'0')}</span>
      <span class="typedot" style="background:${typeColor(s.type)}"></span>
      <span class="btn-text"><div class="btn-route">${esc(s.start)} → ${esc(s.finish)}</div>
      <div class="btn-meta">${fmtDate(s.date)} · ${fmtKm(s.km)}</div></span>`;
    btn.addEventListener('click',()=>selectStage(idx));
    li.appendChild(btn); listEl.appendChild(li);
    if(REST_AFTER[s.n]){
      const rli=document.createElement('li'); rli.className='stage-item';
      const div=document.createElement('div'); div.className='rest-row';
      div.textContent=`${fmtDate(REST_AFTER[s.n])} · ${t('restDay')}`;
      rli.appendChild(div); listEl.appendChild(rli);
    }
  });
}
/* Keeps the stage-list column exactly as tall as the detail panel next to
   it (see the .stagelist comment in the stylesheet for why this is done in
   JS rather than pure CSS). Skipped below the 860px breakpoint, where the
   layout drops to a single column and .stagelist reverts to position:static
   — an inline height there would just add dead space under a short list. */
function syncStageListHeight(){
  const list=document.querySelector('.stagelist');
  const panel=document.getElementById('panel');
  const stagesView=document.getElementById('view-stages');
  if(!list||!panel||!stagesView) return;
  if(window.innerWidth<=860 || !stagesView.classList.contains('active')){
    list.style.height='';
    return;
  }
  list.style.height=panel.offsetHeight+'px';
}
window.addEventListener('resize', syncStageListHeight);

function selectStage(idx){
  activeIdx=idx;
  document.querySelectorAll('.stage-btn').forEach(b=>b.classList.toggle('active',+b.dataset.idx===idx));
  const b=document.querySelector(`.stage-btn[data-idx="${idx}"]`); if(b) b.scrollIntoView({block:'nearest'});
  renderPanel(stages[idx]);
  syncStageListHeight();
}
function catChip(cat){
  if(!cat) return '<span class="dash">—</span>';
  return `<span class="catchip" style="background:${CAT_COLOR[cat]||'var(--climb-none)'}">${cat}</span>`;
}
function renderPanel(st){
  const panel=document.getElementById('panel');
  const tc=typeColor(st.type);
  // Tear down any live map before its container is replaced by innerHTML, so
  // Leaflet doesn't leak the old instance's global (resize) listeners.
  destroyStageMap();
  const climbs=st.climbs||[];
  let climbRows='';
  if(climbs.length){
    climbRows=climbs.map(c=>`<tr>
      <td>${esc(c.name)}</td>
      <td>${catChip(c.cat)}</td>
      <td>${c.len?fmtKm(c.len):'—'}</td>
      <td>${c.grad?esc(c.grad)+' %':'—'}</td>
      <td class="atkm">${c.km!=null?'~ '+t('atKm')+' '+Math.round(c.km):'—'}</td></tr>`).join('');
  }
  const sprints=st.sprints||[];
  let sprintRows='';
  if(sprints.length){
    sprintRows=sprints.map((s,i)=>`<tr>
      <td><span class="flagchip">${t('sprintChip')}${sprints.length>1?' '+(i+1):''}</span></td>
      <td class="atkm">~ ${t('atKm')} ${Math.round(s.km)}</td></tr>`).join('');
  }
  const w=winnerFor(st.n);
  panel.innerHTML=`
    <div class="stagehead">
      <div>
        <h2>${t('stagePrefix')} ${st.n} — ${esc(st.start)} → ${esc(st.finish)}</h2>
        <span class="typepill" style="background:${tc}">${t('typeLabels')[st.type]}</span>
      </div>
      <div class="stagehead-side">
        <span class="datebadge">${fmtDate(st.date)}</span>
        ${mapExpanded ? '' : renderMinimap(st)}
      </div>
    </div>
    ${mapExpanded ? renderMinimapLarge(st) : ''}
    <div class="factbar">
      <div class="fact">${t('factDistance')}<b>${fmtKm(st.km)}</b></div>
      <div class="fact">${t('factType')}<b>${t('typeLabels')[st.type]}</b></div>
      <div class="fact">${t('factGain')}<b>${st.gain?fmtGain(st.gain):'—'}</b></div>
      <div class="fact">${t('factWinner')}<b class="win">${w?esc(w):'—'}</b></div>
    </div>
    <div class="chartbox">
      ${renderProfile(st)}
      <div class="legend">
        <span><span class="leg-swatch" style="background:${CAT_COLOR[1]}"></span> ${t('legCat')} 1</span>
        <span><span class="leg-swatch" style="background:${CAT_COLOR[2]}"></span> 2</span>
        <span><span class="leg-swatch" style="background:${CAT_COLOR[3]}"></span> 3</span>
        <span><span class="leg-swatch" style="background:${CAT_COLOR[4]}"></span> 4</span>
        <span><span class="leg-swatch" style="background:var(--climb-none)"></span> ${t('legUncat')}</span>
        <span><span class="leg-swatch" style="background:${SPRINT_COLOR};border-radius:50%"></span> ${t('legSprint')}</span>
      </div>
      <div class="chart-caption">${t('chartCaption')}</div>
    </div>
    <div class="twocol">
      <div class="block narrative"><h3>${t('descHeader')}</h3>${genDesc(st)}</div>
      <div class="block">
        <h3>${t('climbsHeader')}</h3>
        ${climbRows ? `<table class="points"><thead><tr><th>${t('climbHead')[0]}</th><th>${t('climbHead')[1]}</th><th>${t('climbHead')[2]}</th><th>${t('climbHead')[3]}</th><th>${t('climbHead')[4]}</th></tr></thead><tbody>${climbRows}</tbody></table>`
                    : `<p class="empty-note">${t('noClimbs')}</p>`}
        <h3 style="margin-top:16px;">${t('sprintsHeader')}</h3>
        ${sprintRows ? `<table class="points"><thead><tr><th>${t('sprintHead')[0]}</th><th>${t('sprintHead')[1]}</th></tr></thead><tbody>${sprintRows}</tbody></table>`
                     : `<p class="empty-note">${t('noSprints')}</p>`}
      </div>
    </div>`;

  // Minimap ↔ full-width map toggle. The collapsed minimap expands; the ✕
  // button collapses. Re-rendering the panel swaps the variants; the list
  // height is re-synced since the panel height changes.
  panel.querySelectorAll('[data-mm-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      mapExpanded = !mapExpanded;
      renderPanel(st);
      syncStageListHeight();
    });
  });

  // Mount the real map once the expanded container is in the DOM.
  if(mapExpanded) initStageMap(st);
}

/* ---------- RESULTS (classifications + stage winners) ---------- */
const CLASSES = [
  {key:'gc',        nameKey:'gcName',     jerseyKey:'gcJersey',     colour:'var(--rosa)',      cols:'time'},
  {key:'points',    nameKey:'pointsName', jerseyKey:'pointsJersey', colour:'var(--ciclamino)', cols:'pts'},
  {key:'mountains', nameKey:'momName',    jerseyKey:'momJersey',    colour:'var(--azzurra)',   cols:'pts'},
  {key:'youth',     nameKey:'youthName',  jerseyKey:'youthJersey',  colour:'var(--bianca)',    cols:'time'},
  {key:'teams',     nameKey:'teamsName',  jerseyKey:'teamsJersey',  colour:'var(--grey)',      cols:'time', team:true},
];
function riderCell(row,teamOnly){
  if(teamOnly) return `<span class="rider">${esc(row.rider)}</span>`;
  const nat=row.nat?`<span class="nat">${esc(row.nat)}</span>`:'';
  const team=row.team?`<span class="team">${esc(row.team)}</span>`:'';
  return `<span class="rider">${esc(row.rider)}</span>${nat}${team}`;
}
function classCard(cfg){
  const rows=(RESULTS && RESULTS[cfg.key] && RESULTS[cfg.key].rows)||[];
  const isPts=cfg.cols==='pts';
  let head=`<tr><th>${t('colPos')}</th><th>${t('colRider')}</th>`;
  head+= isPts?`<th>${t('colPts')}</th></tr>`:`<th>${t('colTime')}</th><th>${t('colGap')}</th></tr>`;
  let body='';
  rows.forEach(r=>{
    const leader=r.pos===1?' class="leader"':'';
    const tail= isPts?`<td class="num">${esc(r.val)}</td>`:`<td class="num">${esc(r.val)}</td><td class="gap">${esc(r.gap||(r.pos===1?'—':''))}</td>`;
    body+=`<tr${leader}><td class="pos">${esc(r.pos)}</td><td>${riderCell(r,cfg.team)}</td>${tail}</tr>`;
  });
  return `<div class="card"><div class="card__head">
      <span class="jersey" style="background:${cfg.colour}"></span>
      <div><div class="card__title">${esc(t(cfg.nameKey))}</div><div class="card__sub">${esc(t(cfg.jerseyKey))}</div></div>
    </div><div class="tablewrap"><table class="cls"><thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
}
function renderResults(){
  document.getElementById('classGrid').innerHTML=CLASSES.map(classCard).join('');
  const winners=(RESULTS && RESULTS.stageWinners)||[];
  const gcWinner=(RESULTS && RESULTS.gc && RESULTS.gc.rows[0] && RESULTS.gc.rows[0].rider)||'';
  document.getElementById('stagesThead').innerHTML=`<tr><th>${t('colStage')}</th><th>${t('colRoute')}</th><th>${t('colWinner')}</th></tr>`;
  document.getElementById('stagesTbody').innerHTML=winners.map(w=>{
    const pink=w.winner && w.winner===gcWinner?' class="pink"':'';
    return `<tr${pink}><td class="pos">${esc(w.n)}</td><td class="route">${esc(w.route||'')}</td><td class="win">${esc(w.winner||'')}</td></tr>`;
  }).join('');
}

  document.getElementById('stageListHeader').textContent=t('stageListHeader');
  document.getElementById('classHeading').textContent=t('classHeading');
  document.getElementById('stagesHeading').textContent=t('stagesHeading');
  document.getElementById('profileDisclaimer').textContent=t('profileDisclaimer');
  document.getElementById('disclaimerLabel').textContent=t('disclaimerLabel');
  document.getElementById('disclaimerText').textContent=t('disclaimerText');
  document.getElementById('sourcesLabel').textContent=t('sourcesLabel');
  document.getElementById('sourcesText').textContent=t('sourcesText');
  document.getElementById('footerNote').textContent=t('footerNote');
  renderStageList();
  renderPanel(stages[activeIdx]);
  renderResults();
  document.querySelectorAll('#langSel button').forEach(b=>{
    const active=b.dataset.lang===lang;
    b.classList.toggle('active',active);
    b.setAttribute('aria-pressed',active?'true':'false');
  });
  document.documentElement.lang=lang;
  syncStageListHeight();
}

/* ---------- TABS ---------- */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>{ x.classList.toggle('active',x===tab); x.setAttribute('aria-selected',x===tab?'true':'false'); });
    const v=tab.dataset.view;
    document.querySelectorAll('.view').forEach(sec=>sec.classList.toggle('active', sec.id==='view-'+v));
    syncStageListHeight();
  });
});

/* ---------- LANGUAGE ---------- */
document.querySelectorAll('#langSel button').forEach(btn=>{
  btn.addEventListener('click',()=>{ lang=btn.dataset.lang; localStorage.setItem(LANG_KEY,lang); render(); });
});

async function load(){
  try{
    const resp=await fetch(DATA_URL,{cache:'no-store'});
    if(resp.ok) RESULTS=await resp.json();
  }catch(e){ /* file:// or offline — winners/standings simply blank */ }
  render();
}
load();
</script>
</body>
</html>
