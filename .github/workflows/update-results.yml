name: Päivitä TdF-tulokset

on:
  schedule:
    # GitHub Actions käyttää AINA UTC-aikaa (ei aikavyöhykevalintaa cronille).
    # Etapit päättyvät tyypillisesti n. klo 15–18 UTC; avausetapin TTT
    # poikkeuksellisesti n. 17.15 UTC. Ajetaan 30 min välein klo 14–20 UTC
    # heinäkuussa = 17–23 Suomen aikaa.
    - cron: '*/30 14-20 * 7 *'
    # Kevyt varmistusajo kerran aamulla (esim. myöhään kirjatut korjaukset).
    - cron: '15 6 * 7 *'
  # workflow_dispatch mahdollistaa manuaalisen käynnistyksen Actions-välilehdeltä
  # — hyödyllinen testaukseen, koska cron-ajot voivat viivästyä 10–30 min.
  workflow_dispatch:

# Estä päällekkäiset ajot.
concurrency:
  group: tdf-results
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Asenna riippuvuudet
        run: pip install procyclingstats

      - name: Hae tulokset
        run: python scripts/fetch_results.py

      - name: Commitoi jos muuttunut
        run: |
          git config user.name "tdf-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/results.json
          if git diff --cached --quiet; then
            echo "Ei muutoksia."
          else
            git commit -m "Tulokset päivitetty $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
