name: Update results and publish

on:
  schedule:
    # GitHub Actions ALWAYS uses UTC. Stages typically finish around
    # 14:00–18:00 UTC. Run every 30 min from 14:00–20:00 UTC in July
    # = 17:00–23:00 Finnish time (summer time, UTC+3).
    - cron: '*/30 14-20 * 7 *'
    # Light safety run in the morning in case of late-recorded corrections.
    - cron: '15 6 * 7 *'
  # Also redeploy whenever something is pushed to main (e.g. a hand-edited index.html).
  push:
    branches: [main]
  # Manual trigger from the Actions tab (for testing).
  workflow_dispatch:

# Don't interrupt a running deployment; queue overlapping runs.
# cancel-in-progress: false is essential here — if a new scheduled run
# interrupted an in-progress deploy (cancel-in-progress: true), Pages
# often returns "Deployment failed, try again later". This is also the
# recommended value in GitHub's own Pages template.
concurrency:
  group: pages
  cancel-in-progress: false

# build and deploy are separate jobs (GitHub's own Pages template does the
# same). If the deploy job ever fails and is re-run from the Actions tab
# ("Re-run failed jobs"), the build job does NOT run again, so the
# upload-pages-artifact step does not run a second time. Otherwise the same
# "github-pages" artifact could be created twice during a run, which makes
# the deploy-pages action fail with "Multiple artifacts named github-pages
# were unexpectedly found" (a known, still-unfixed issue in the
# actions/deploy-pages project, see
# https://github.com/actions/deploy-pages/issues/338).
jobs:
  build:
    runs-on: ubuntu-latest
    # contents:write = the bot may commit results.json.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        # letour.fr's result pages are scraped directly with requests +
        # selectolax (procyclingstats.com blocked GitHub Actions with
        # Cloudflare bot detection; letour.fr is not behind the same
        # protection).
        run: pip install requests selectolax

      # If the fetch crashes (e.g. the site structure changes), publishing
      # still continues — the page shows the last successful data.
      - name: Fetch results
        run: python scripts/fetch_results.py
        continue-on-error: true

      # Persist results into the repo (persistence + history). A commit made
      # by GITHUB_TOKEN does NOT trigger the workflow again -> no loop.
      - name: Commit if changed
        run: |
          git config user.name "tdf-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ ! -f data/results.json ]; then
            echo "No results available yet, nothing to commit."
            exit 0
          fi
          git add data/results.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Results updated $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - uses: actions/configure-pages@v6

      # Package the whole site (index.html + data/) as a Pages artifact.
      # upload-pages-artifact@v5 + deploy-pages@v5 belong together (new
      # artifact format) and use Node 24 — removing the Node 20 deprecation
      # warning.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # pages:write + id-token:write = the deploy-pages action may publish to Pages.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # The GitHub Pages backend occasionally returns a transient
      # "Deployment failed, try again later" error even when the artifact is
      # fine. The first attempt runs with continue-on-error so the job
      # doesn't fail immediately, and on failure it retries once after a
      # short wait. This way transient errors recover without manual work.
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Publish again (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
