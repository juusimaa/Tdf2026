name: Päivitä tulokset ja julkaise

on:
  schedule:
    # GitHub Actions käyttää AINA UTC-aikaa. Etapit päättyvät tyypillisesti
    # n. klo 14–18 UTC. Ajetaan 30 min välein klo 14–20 UTC heinäkuussa
    # = 17–23 Suomen aikaa (kesäaika UTC+3).
    - cron: '*/30 14-20 * 7 *'
    # Kevyt varmistusajo aamulla myöhään kirjattujen korjausten varalta.
    - cron: '15 6 * 7 *'
  # Redeploy myös aina kun mainiin työnnetään (esim. käsin muokattu index.html).
  push:
    branches: [main]
  # Manuaalinen käynnistys Actions-välilehdeltä (testaukseen).
  workflow_dispatch:

# Älä keskeytä käynnissä olevaa julkaisua; jonota päällekkäiset ajot.
# cancel-in-progress: false on tässä olennainen — jos uusi ajastettu ajo
# keskeyttäisi käynnissä olevan deployn (cancel-in-progress: true), Pages
# palauttaa usein "Deployment failed, try again later". Tämä on myös
# GitHubin oman Pages-mallipohjan suositusarvo.
concurrency:
  group: pages
  cancel-in-progress: false

# build ja deploy ovat omat jobinsa (GitHubin oma Pages-mallipohja tekee
# samoin). Jos deploy-job joskus epäonnistuu ja sen ajaa uudelleen
# Actions-välilehdeltä ("Re-run failed jobs"), build-job EI ajeta
# uudelleen, eikä upload-pages-artifact-askel siis suorita toista kertaa.
# Muuten sama artefakti "github-pages" saattaisi syntyä ajon aikana
# kahdesti, mikä kaataa deploy-pages-actionin virheeseen "Multiple
# artifacts named github-pages were unexpectedly found" (tunnettu,
# vielä korjaamaton ongelma actions/deploy-pages-projektissa, ks.
# https://github.com/actions/deploy-pages/issues/338).
jobs:
  build:
    runs-on: ubuntu-latest
    # contents:write = botti saa commitoida results.jsonin.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Asenna riippuvuudet
        # letour.fr:n tulossivut scrapataan suoraan requests + selectolax
        # -yhdistelmällä (procyclingstats.com esti GitHub Actionsin
        # Cloudflare-bottitunnistuksella, letour.fr ei ole samanlaisen
        # suojauksen takana).
        run: pip install requests selectolax

      # Jos haku kaatuu (esim. PCS muuttaa sivurakennettaan), julkaisu
      # jatkuu silti — sivu näyttää edellisen onnistuneen datan.
      - name: Hae tulokset
        run: python scripts/fetch_results.py
        continue-on-error: true

      # Säilö tulokset repoon (persistointi + historia). GITHUB_TOKENin
      # tekemä commit EI laukaise workflow'ta uudelleen -> ei silmukkaa.
      - name: Commitoi jos muuttunut
        run: |
          git config user.name "tdf-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ ! -f data/results.json ]; then
            echo "Ei tuloksia vielä saatavilla, ei committoitavaa."
            exit 0
          fi
          git add data/results.json
          if git diff --cached --quiet; then
            echo "Ei muutoksia."
          else
            git commit -m "Tulokset päivitetty $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - uses: actions/configure-pages@v5

      # Paketoi koko sivu (index.html + data/) Pages-artefaktiksi.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # pages:write + id-token:write = deploy-pages-action saa julkaista Pagesiin.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # GitHub Pagesin taustapalvelu palauttaa ajoittain ohimenevän
      # "Deployment failed, try again later" -virheen, vaikka artefakti on
      # kunnossa. Ensimmäinen yritys tehdään continue-on-error-lipulla, jotta
      # job ei kaadu heti, ja epäonnistuessa yritetään kerran uudelleen pienen
      # odotuksen jälkeen. Näin ohimenevät virheet korjautuvat ilman käsityötä.
      - name: Julkaise GitHub Pagesiin
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Odota ennen uusintayritystä
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Julkaise uudelleen (uusintayritys)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
